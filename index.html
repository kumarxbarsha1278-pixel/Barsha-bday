<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mamma ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- START -->
<div id="startScreen">
  <h1 id="startText">Something special is waiting for you Mamma ❤️</h1>
</div>

<!-- GIFT -->
<div id="giftBox" class="hidden">🎁</div>

<!-- MAIN -->
<div id="main" class="hidden">

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <!-- SLIDER -->
  <div class="slider">
    <img src="1.jpg" class="slide active">
    <img src="2.jpg" class="slide">
    <img src="3.jpg" class="slide">
  </div>

  <!-- QUOTES -->
  <div id="quoteBox"></div>

</div>

<!-- CANVAS FIREWORK -->
<canvas id="fireworks"></canvas>

<!-- FADE -->
<div id="fadeScreen"></div>

<script src="script.js"></script>
</body>
</html>
