<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mamma ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- INTRO -->
<div id="startScreen">
  <h1>Something special is waiting for you Mamma ❤️</h1>
</div>

<!-- GIFT SCREEN -->
<div id="giftContainer" class="hidden">

  <!-- TOP LINE -->
  <div id="giftTopLine">
    Don’t wait… tap the heart below <span class="heartPulse">🤍</span>
  </div>

  <!-- GIFT IMAGE -->
  <img src="gift.png" id="giftImg">

</div>

<!-- MAIN -->
<div id="main" class="hidden">

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <div class="slider">
    <img src="1.jpg" class="slide active">
    <img src="2.jpg" class="slide">
    <img src="3.jpg" class="slide">

    <div id="mainTitle">Happy Birthday Mamma 🎂❤️</div>
    <div id="quoteBox"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
