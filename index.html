<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mamma ❤️</title>

<!-- Google Font (handwriting) -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- START -->
<div id="startScreen">
  <h1 id="startText">Something special is waiting for you Mamma ❤️</h1>
</div>

<!-- 3D GIFT -->
<div id="giftBox" class="hidden">
  <div class="box">
    <div class="lid"></div>
    <div class="body"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <!-- SLIDER -->
  <div class="slider">
    <img src="1.jpg" class="slide active">
    <img src="2.jpg" class="slide">
    <img src="3.jpg" class="slide">

    <!-- QUOTE INSIDE IMAGE -->
    <div id="quoteBox"></div>
  </div>

</div>

<canvas id="fireworks"></canvas>
<div id="fadeScreen"></div>

<script src="script.js"></script>
</body>
</html>
