<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mamma ❤️</title>

<meta name="theme-color" content="#000000">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- START -->
<div id="startScreen">
  <h1 id="startText">Something special is waiting for you Mamma ❤️</h1>
</div>

<!-- TAP AREA -->
<div id="tapArea" class="hidden"></div>

<!-- GIFT -->
<div id="giftBox" class="hidden">
  <div class="gift">
    <div class="lid"></div>
    <div class="box"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mp3">
  </audio>

  <audio id="voiceNote" preload="auto">
    <source src="voice.mp3" type="audio/mp3">
  </audio>

  <!-- SLIDER (FIXED PATHS ✔️) -->
  <div class="slider">
    <img src="photos/1.jpg" class="slide active">
    <img src="photos/2.jpg" class="slide">
    <img src="photos/3.jpg" class="slide">
  </div>

  <!-- QUOTE -->
  <div id="quoteBox"></div>

</div>

<!-- FINAL MESSAGE -->
<div id="finalMessage" class="hidden">
  HAPPY BIRTHDAY MAMMA 🎂❤️<br>I LOVE YOU FOREVER
</div>

<!-- FIREWORKS -->
<canvas id="fireworks"></canvas>

<!-- FADE -->
<div id="fadeScreen"></div>

<script src="script.js"></script>
</body>
</html>
